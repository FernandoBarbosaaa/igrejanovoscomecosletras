<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de PowerPoint para Louvores</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Gerador de PowerPoint para Louvores</h1>
    <form id="pptxForm">
      <label for="songName">Nome do Louvor:</label>
      <input type="text" id="songName" required>

      <label for="artistName">Nome do Artista:</label>
      <input type="text" id="artistName" required>

      <button type="submit">Gerar PowerPoint</button>
    </form>
    <div id="message"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
